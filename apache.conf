# ─────────────────────────────────────────────────────────────────
# apache.conf
#
# Configuração do Apache dentro do container Docker.
#
# DocumentRoot → pasta raiz onde o Apache serve os arquivos.
#                Aponta para /var/www/html, que é onde o Dockerfile
#                copiou os arquivos do projeto.
#
# AllowOverride All → permite que arquivos .htaccess funcionem,
#                     necessário para redirecionamentos e URLs limpas.
#
# ErrorLog / CustomLog → logs de erro e acesso visíveis no painel
#                        do Render em "Logs".
# ─────────────────────────────────────────────────────────────────

<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # Garante que arquivos .php sejam processados pelo PHP
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
